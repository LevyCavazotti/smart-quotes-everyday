<!DOCTYPE html><html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Daily Quote</title>  <!-- Fontes clássicas -->  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Libre+Baskerville&display=swap" rel="stylesheet">  <style>
    :root {
      --bg: #1e1a16;
      --card: #2a231d;
      --accent: #8b6b4f;
      --text: #f2e9e1;
      --muted: #c4b8ad;
    }

    body {
      margin: 0;
      font-family: 'Libre Baskerville', serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
    }

    header {
      text-align: center;
      padding: 1.5rem;
      border-bottom: 1px solid #3a2f26;
    }

    h1 {
      font-family: 'Playfair Display', serif;
      color: var(--accent);
      margin: 0;
    }

    nav a {
      margin: 0 1rem;
      color: var(--muted);
      text-decoration: none;
      font-size: 0.9rem;
    }

    nav a:hover { color: var(--accent); }

    main {
      max-width: 800px;
      margin: 3rem auto;
      padding: 0 1.5rem;
    }

    section { display: none; }
    section.active { display: block; }

    .quote-card {
      background: var(--card);
      padding: 2.5rem;
      border-radius: 12px;
      box-shadow: 0 10px 30px rgba(0,0,0,.4);
    }

    .quote-text {
      font-family: 'Playfair Display', serif;
      font-size: 1.6rem;
      margin-bottom: 1.5rem;
    }

    .quote-author {
      text-align: right;
      font-style: italic;
      color: var(--muted);
    }

    .actions {
      margin-top: 2rem;
      display: flex;
      justify-content: center;
      gap: 1rem;
    }

    button {
      background: none;
      border: 1px solid var(--accent);
      color: var(--accent);
      padding: .5rem 1.2rem;
      border-radius: 20px;
      cursor: pointer;
      font-family: inherit;
    }

    button:hover {
      background: var(--accent);
      color: var(--bg);
    }

    footer {
      text-align: center;
      padding: 2rem;
      font-size: .8rem;
      color: var(--muted);
    }
  </style></head>
<body><header>
  <h1>Daily Quote</h1>
  <nav>
    <a href="#" onclick="showSection('today')">Today</a>
    <a href="#" onclick="showSection('archive')">Archive</a>
    <a href="#" onclick="showSection('favorites')">Favorites</a>
    <a href="#" onclick="showSection('about')">About</a>
    <span id="authArea" style="margin-left:1rem"></span>
  </nav>
</header><main>
  <!-- Today -->
  <section id="today" class="active">
    <div class="quote-card">
      <div class="quote-text" id="quoteText"></div>
      <div class="quote-author" id="quoteAuthor"></div><div class="actions">
    <!-- Futuro: Supabase -->
    <button onclick="saveQuote()">♡ Save</button>
    <button onclick="shareQuote()">↗ Share</button>
  </div>
</div>

  </section>  <!-- Archive -->  <section id="archive">
    <h2>Archive</h2>
    <ul id="archiveList"></ul>
  </section>  <!-- Favorites -->  <section id="favorites">
    <h2>Favorites</h2>
    <ul id="favoritesList"></ul>
  </section>  <!-- About -->  <section id="about">
    <h2>About</h2>
    <p>
      A literary project conceived as a daily ritual.
      One quote a day, without haste, without noise.
    </p>
  </section>
</main><footer>
  © 2026 — Daily Quote
</footer><script type="module">
  /* =============================
     SUPABASE CONFIG
  ============================== */

  import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm";

  const SUPABASE_URL = "https://YOUR_PROJECT_ID.supabase.co";
  const SUPABASE_KEY = "YOUR_PUBLIC_ANON_KEY";

  const supabase = createClient(SUPABASE_URL, SUPABASE_KEY);

  /* =============================
     ESTADO GLOBAL
  ============================== */

  let user = null;
  const authArea = document.getElementById('authArea');
  let todayQuote = null;

  /* =============================
     AUTH
  ============================== */

  const { data: authData } = await supabase.auth.getSession();
  user = authData.session?.user || null;
  renderAuth();

  /* =============================
     FETCH QUOTES
  ============================== */

  const { data: quotes } = await supabase
    .from('quotes')
    .select('*')
    .order('created_at');

  const today = new Date();
  const index = today.getDate() % quotes.length;
  todayQuote = quotes[index];

  document.getElementById('quoteText').textContent = `“${todayQuote.text}”`;
  document.getElementById('quoteAuthor').textContent = `— ${todayQuote.author}`;

  /* =============================
     ARCHIVE
  ============================== */

  const archiveList = document.getElementById('archiveList');
  quotes.forEach(q => {
    const li = document.createElement('li');
    li.textContent = `“${q.text}” — ${q.author}`;
    archiveList.appendChild(li);
  });

  /* =============================
     FAVORITOS
  ============================== */

  async function loadFavorites() {
    if (!user) return;

    const { data } = await supabase
      .from('saved_quotes')
      .select('quotes(text, author)')
      .eq('user_id', user.id);

    const list = document.getElementById('favoritesList');
    list.innerHTML = '';

    data.forEach(item => {
      const li = document.createElement('li');
      li.textContent = `“${item.quotes.text}” — ${item.quotes.author}`;
      list.appendChild(li);
    });
  }

  loadFavorites();

  function renderAuth() {
    if (user) {
      authArea.innerHTML = `<button onclick="logout()">Sign out</button>`;
    } else {
      authArea.innerHTML = `<button onclick="login()">Sign in</button>`;
    }
  }

  window.login = async function () {
    const email = prompt('Enter your email to sign in:');
    if (!email) return;
    await supabase.auth.signInWithOtp({ email });
    alert('Check your email ✨');
  }

  window.logout = async function () {
    await supabase.auth.signOut();
    location.reload();
  }

  /* =============================
     ACTIONS
  ============================== */

  window.saveQuote = async function () {
    if (!user) {
      alert('Please sign in to save quotes ✨');
      return;
    }

    await supabase.from('saved_quotes').insert({
      user_id: user.id,
      quote_id: todayQuote.id
    });

    loadFavorites();
  }

  window.shareQuote = function () {
    const text = `“${todayQuote.text}” — ${todayQuote.author}`;

    if (navigator.share) {
      navigator.share({ title: 'Daily Quote', text });
    } else {
      navigator.clipboard.writeText(text);
      alert('Quote copied ✨');
    }
  }

  /* =============================
     NAVIGATION
  ============================== */

  window.showSection = function (id) {
    document.querySelectorAll('section').forEach(s => s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
  }
</script></body>
</html>
